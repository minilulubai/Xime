name: Nightly Build

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  nightly:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;28.2.13676358"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV
          echo "ANDROID_NDK=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Cache sherpa-onnx build
        uses: actions/cache@v4
        with:
          path: |
            build/sherpa-onnx-*
            app/src/main/jniLibs/arm64-v8a/libsherpa-onnx-jni.so
            app/src/main/jniLibs/armeabi-v7a/libsherpa-onnx-jni.so
          key: sherpa-${{ runner.os }}-1.13.0-${{ hashFiles('build-sherpa-onnx.sh') }}
          restore-keys: |
            sherpa-${{ runner.os }}-

      - name: Download ONNX Runtime and build sherpa-onnx
        run: ./gradlew downloadOnnx buildSherpaOnnx --no-daemon

      - name: Cache CMake build
        uses: actions/cache@v4
        with:
          path: |
            app/.cxx
            app/src/main/jni/boost
            app/src/main/jni/boost-*.tar.xz
          key: cmake-${{ runner.os }}-${{ hashFiles('app/src/main/jni/CMakeLists.txt') }}
          restore-keys: |
            cmake-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APKs
        run: ./gradlew assembleDebug --no-daemon

      - name: Get build info
        id: info
        run: |
          echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Delete existing nightly release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true

      - name: Create nightly release and upload APKs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APKS=$(find app/build/outputs/apk/debug -name "*.apk" -type f | tr '\n' ' ')
          PLUGIN_APKS=$(find plugins -path "*/build/outputs/apk/debug/*.apk" -type f 2>/dev/null | tr '\n' ' ')
          ALL_APKS="$APKS $PLUGIN_APKS"

          if [ -z "$APKS" ]; then
            echo "::error::No main APKs found!"
            exit 1
          fi

          gh release create nightly \
            --title "Nightly Build (${{ steps.info.outputs.DATE }})" \
            --notes "## Nightly Build

            - 日期: ${{ steps.info.outputs.DATE }}
            - Commit: \`${{ steps.info.outputs.COMMIT }}\`
            - 构建时间: $(date -u +'%Y-%m-%d %H:%M:%S UTC')

            ⚠️ 自动每日构建，非稳定版本。" \
            --prerelease \
            $ALL_APKS
