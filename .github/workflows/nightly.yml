name: Nightly Build

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.decide.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for new commits since last nightly
        id: check
        run: |
          LAST_COMMIT=$(gh release view nightly --json targetCommitish --jq '.targetCommitish' 2>/dev/null || echo "")
          CURRENT_COMMIT=$(git rev-parse HEAD)

          if [ -n "$LAST_COMMIT" ] && [ "$LAST_COMMIT" = "$CURRENT_COMMIT" ]; then
            echo "has_new_commits=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_new_commits=true" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if release was published today
        id: release_check
        run: |
          TODAY=$(date +'%Y-%m-%d')
          RELEASE_TAG=$(gh release list --limit 30 --json createdAt,tagName,isPrerelease --jq '.[] | select(.createdAt | startswith("'"$TODAY"'")) | select(.isPrerelease == false) | .tagName' | head -1)
          if [ -n "$RELEASE_TAG" ]; then
            echo "Today ($TODAY) has release $RELEASE_TAG, skipping nightly"
            echo "release_today=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_today=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Decide whether to build
        id: decide
        run: |
          if [ "${{ steps.release_check.outputs.release_today }}" = "true" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "reason=Release published today"
          elif [ "${{ steps.check.outputs.has_new_commits }}" = "false" ]; then
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "reason=No new commits since last nightly"
          else
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "reason=New commits to build"
          fi

  nightly:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: |
          sdkmanager "ndk;28.2.13676358"
          echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV
          echo "ANDROID_NDK=$ANDROID_HOME/ndk/28.2.13676358" >> $GITHUB_ENV

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build

      - name: Cache sherpa-onnx build
        uses: actions/cache@v6
        with:
          path: |
            build/sherpa-onnx-*
            app/src/main/jniLibs/arm64-v8a/libsherpa-onnx-jni.so
            app/src/main/jniLibs/armeabi-v7a/libsherpa-onnx-jni.so
          key: sherpa-${{ runner.os }}-1.13.0-${{ hashFiles('build-sherpa-onnx.sh') }}
          restore-keys: |
            sherpa-${{ runner.os }}-

      - name: Download ONNX Runtime and build sherpa-onnx
        run: ./gradlew downloadOnnx buildSherpaOnnx --no-daemon

      - name: Cache CMake build
        uses: actions/cache@v6
        with:
          path: |
            app/.cxx
            app/src/main/jni/boost
            app/src/main/jni/boost-*.tar.xz
          key: cmake-${{ runner.os }}-${{ hashFiles('app/src/main/jni/CMakeLists.txt') }}
          restore-keys: |
            cmake-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Nightly APKs (Unsigned)
        run: |
          DATE=$(date +'%Y%m%d')
          COMMIT=$(git rev-parse --short HEAD)
          BASE_VERSION=$(grep -oP 'versionName\s*=\s*"\K[^"]+' app/build.gradle.kts)
          echo "Base version: $BASE_VERSION"
          ./gradlew assembleRelease \
            -PversionCode=$DATE \
            -PversionName="${BASE_VERSION}-nightly-$DATE-$COMMIT" \
            --no-daemon

      - name: Sign Main App APKs
        uses: r0adkll/sign-android-release@v1
        id: sign_main_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Get build info
        id: info
        run: |
          echo "DATE=$(date +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "COMMIT=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Delete existing nightly release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --yes --cleanup-tag 2>/dev/null || true

      - name: Create nightly release and upload APKs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          APKS=$(find app/build/outputs/apk/release -name "*-signed.apk" -type f | sort | tr '\n' ' ')
          PLUGIN_APKS=$(find plugins -path "*/build/outputs/apk/release/*-signed.apk" -type f 2>/dev/null | sort | tr '\n' ' ')

          if [ -z "$APKS" ]; then
            echo "::error::No main APKs found!"
            exit 1
          fi

          gh release create nightly \
            --title "Nightly Build (${{ steps.info.outputs.DATE }})" \
            --notes "## Nightly Build

            - 日期: ${{ steps.info.outputs.DATE }}
            - Commit: \`${{ steps.info.outputs.COMMIT }}\`
            - 构建时间: $(date -u +'%Y-%m-%d %H:%M:%S UTC')

            ⚠️ 自动每日构建，非稳定版本。" \
            --prerelease \
            $APKS $PLUGIN_APKS
